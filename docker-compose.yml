services:
  app:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - mongo
      - redis
    env_file:
      - .env
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
volumes:
  mongo-data:
